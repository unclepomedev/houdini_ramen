[workspace]
members = [
    "crates/*"
]

[package]
name = "houdini_ramen"
version = "0.0.2"
edition = "2024"
description = "Nodes as Code for Houdini (Under Development)"
license = "MIT"
repository = "https://github.com/unclepomedev/houdini_ramen"
rust-version = "1.94"

include = [
    "src/**/*",
    "Cargo.toml",
    "README.md",
    "LICENSE"
]

[dependencies]
houdini_ramen_core = { path = "crates/houdini_ramen_core", version = "0.0.2" }
houdini_ramen_chop = { path = "crates/houdini_ramen_chop", version = "0.0.2", optional = true }
houdini_ramen_chopnet = { path = "crates/houdini_ramen_chopnet", version = "0.0.2", optional = true }
houdini_ramen_cop = { path = "crates/houdini_ramen_cop", version = "0.0.2", optional = true }
houdini_ramen_cop2 = { path = "crates/houdini_ramen_cop2", version = "0.0.2", optional = true }
houdini_ramen_copnet = { path = "crates/houdini_ramen_copnet", version = "0.0.2", optional = true }
houdini_ramen_data = { path = "crates/houdini_ramen_data", version = "0.0.2", optional = true }
houdini_ramen_director = { path = "crates/houdini_ramen_director", version = "0.0.2", optional = true }
houdini_ramen_dop = { path = "crates/houdini_ramen_dop", version = "0.0.2", optional = true }
houdini_ramen_driver = { path = "crates/houdini_ramen_driver", version = "0.0.2", optional = true }
houdini_ramen_lop = { path = "crates/houdini_ramen_lop", version = "0.0.2", optional = true }
houdini_ramen_manager = { path = "crates/houdini_ramen_manager", version = "0.0.2", optional = true }
houdini_ramen_object = { path = "crates/houdini_ramen_object", version = "0.0.2", optional = true }
houdini_ramen_shop = { path = "crates/houdini_ramen_shop", version = "0.0.2", optional = true }
houdini_ramen_sop = { path = "crates/houdini_ramen_sop", version = "0.0.2", optional = true }
houdini_ramen_top = { path = "crates/houdini_ramen_top", version = "0.0.2", optional = true }
houdini_ramen_topnet = { path = "crates/houdini_ramen_topnet", version = "0.0.2", optional = true }
houdini_ramen_vop = { path = "crates/houdini_ramen_vop", version = "0.0.2", optional = true }
houdini_ramen_vopnet = { path = "crates/houdini_ramen_vopnet", version = "0.0.2", optional = true }
houdini_ramen_helpers = { path = "crates/houdini_ramen_helpers", version = "0.0.2", optional = true }

[features]
default = [
    "chop", "chopnet", "cop", "cop2", "copnet", "data", "director", "dop", "driver",
    "lop", "manager", "object", "shop", "sop", "top", "topnet", "vop", "vopnet", "helpers"
]

chop = ["dep:houdini_ramen_chop"]
chopnet = ["dep:houdini_ramen_chopnet"]
cop = ["dep:houdini_ramen_cop"]
cop2 = ["dep:houdini_ramen_cop2"]
copnet = ["dep:houdini_ramen_copnet"]
data = ["dep:houdini_ramen_data"]
director = ["dep:houdini_ramen_director"]
dop = ["dep:houdini_ramen_dop"]
driver = ["dep:houdini_ramen_driver"]
lop = ["dep:houdini_ramen_lop"]
manager = ["dep:houdini_ramen_manager"]
object = ["dep:houdini_ramen_object"]
shop = ["dep:houdini_ramen_shop"]
sop = ["dep:houdini_ramen_sop"]
top = ["dep:houdini_ramen_top"]
topnet = ["dep:houdini_ramen_topnet"]
vop = ["dep:houdini_ramen_vop"]
vopnet = ["dep:houdini_ramen_vopnet"]
helpers = ["dep:houdini_ramen_helpers"]
