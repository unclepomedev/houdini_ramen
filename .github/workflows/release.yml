name: Release to crates.io

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Check version consistency
        shell: bash
        run: |
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "houdini_ramen") | .version')
          TAG_VERSION=${GITHUB_REF_NAME#v}

          echo "Cargo: $CARGO_VERSION, Tag: $TAG_VERSION"

          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch! Cargo.toml ($CARGO_VERSION) != Tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Cargo Publish All
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          publish() {
            for i in {1..10}; do
              cargo publish -p "$1" && return 0
              sleep 15
            done
            return 1
          }

          publish houdini_ramen_core

          for dir in crates/houdini_ramen_*; do
            crate=$(basename "$dir")
            if [ "$crate" != "houdini_ramen_core" ] && [ "$crate" != "houdini_ramen_helpers" ]; then
              publish "$crate"
            fi
          done

          publish houdini_ramen_helpers
          publish houdini_ramen
